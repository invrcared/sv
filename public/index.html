<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Link in Bio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Lexend:wght@500;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="clickOverlay" class="overlay hidden">
      <button id="enterBtn" class="button">click to enter</button>
    </div>

    <div class="background-layer" id="backgroundContainer"></div>

    <main class="bento-grid">
      <section class="glass card profile-card">
        <div class="flex items-center gap-4">
          <img id="avatar" class="avatar" src="" alt="avatar" />
          <div>
            <div class="flex items-center gap-2">
              <h1 id="name" class="text-2xl font-extrabold"></h1>
              <span id="verified" class="verified-pill hidden">
                <i data-lucide="badge-check" class="w-4 h-4"></i> verified
              </span>
            </div>
            <p id="status" class="small"></p>
          </div>
        </div>
        <p id="bio" class="mt-4 text-neutral-200 leading-relaxed"></p>
      </section>

      <section class="glass card social-card">
        <h2 class="text-lg font-semibold mb-3">socials</h2>
        <div id="socialLinks" class="grid gap-3"></div>
      </section>

      <section class="glass card meta-card">
        <div class="flex flex-wrap justify-between gap-3 items-center">
          <div>
            <h3 class="font-semibold">Creator Studio</h3>
            <p class="small">Customize this page at any time.</p>
          </div>
          <a class="button" href="/studio">open dashboard</a>
        </div>
        <div id="musicWrap" class="mt-4 hidden">
          <p id="musicTitle" class="small mb-2"></p>
          <audio id="musicPlayer" controls class="w-full"></audio>
        </div>
      </section>
    </main>

    <script src="/main.js"></script>
  </body>
</html>
